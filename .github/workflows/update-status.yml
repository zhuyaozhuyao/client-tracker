name: Update Client Status
on:
  repository_dispatch:
    types: [client-checked]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update status JSON
        run: |
          FILE="${{ github.event.client_payload.file }}.json"
          ID="${{ github.event.client_payload.id }}"
          if [ -f "$FILE" ]; then
            python3 -c "
import json
with open('$FILE') as f: d=json.load(f)
d['$ID']=True
with open('$FILE','w') as f: json.dump(d,f,indent=2)
print('Updated', '$ID', 'in', '$FILE')
"
          else
            echo "File $FILE not found"
          fi
      
      - name: Commit and push
        run: |
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@xiaohongshu.com"
          git add -A
          git diff --staged --quiet || git commit -m "client checked: ${{ github.event.client_payload.id }}"
          git push
